# config_mtl_asr_st_ctcst.yaml
# ----------------------------
# Multi-task learning config cho StreamSpeech VI→EN model.
# Định nghĩa 3 decoder heads song song:
#
#   target_unigram    : MT Transformer decoder (VI speech → EN text, loss×8)
#   source_unigram    : ASR CTC decoder        (VI speech → VI text, loss×4)
#   ctc_target_unigram: ST  CTC decoder        (VI speech → EN text, loss×4)
#
# ⚠️  Thay thế /PATH/TO/SERVER bằng đường dẫn tuyệt đối trên server.

# --- MT Transformer decoder: Speech → EN text (task chính) ---
target_unigram:
   decoder_type: transformer
   dict: /PATH/TO/SERVER/SpeechTranslation/configs/vi-en/tgt_unigram6000/spm_unigram_en.txt
   data: /PATH/TO/SERVER/SpeechTranslation/configs/vi-en/tgt_unigram6000
   loss_weight: 8.0
   rdrop_alpha: 0.0
   decoder_args:
      decoder_layers: 4
      decoder_embed_dim: 512
      decoder_ffn_embed_dim: 2048
      decoder_attention_heads: 8
   label_smoothing: 0.1

# --- ASR CTC decoder: Speech → VI transcript (multitask) ---
source_unigram:
   decoder_type: ctc
   dict: /PATH/TO/SERVER/SpeechTranslation/configs/vi-en/src_unigram6000/spm_unigram_vi.txt
   data: /PATH/TO/SERVER/SpeechTranslation/configs/vi-en/src_unigram6000
   loss_weight: 4.0
   rdrop_alpha: 0.0
   decoder_args:
      decoder_layers: 0
      decoder_embed_dim: 512
      decoder_ffn_embed_dim: 2048
      decoder_attention_heads: 8
   label_smoothing: 0.1

# --- ST CTC decoder: Speech → EN text trực tiếp (multitask) ---
ctc_target_unigram:
   decoder_type: ctc
   dict: /PATH/TO/SERVER/SpeechTranslation/configs/vi-en/tgt_unigram6000/spm_unigram_en.txt
   data: /PATH/TO/SERVER/SpeechTranslation/configs/vi-en/tgt_unigram6000
   loss_weight: 4.0
   rdrop_alpha: 0.0
   decoder_args:
      decoder_layers: 0
      decoder_embed_dim: 512
      decoder_ffn_embed_dim: 2048
      decoder_attention_heads: 8
   label_smoothing: 0.1
