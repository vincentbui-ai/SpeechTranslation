# config_gcmvn.yaml
# -----------------
# Cấu hình input features cho StreamSpeech VI-EN model.
# Sử dụng 80-dim filterbank + Global CMVN normalization + SpecAugment.
#
# ⚠️  Cập nhật `stats_npz_path` thành đường dẫn tuyệt đối trên server
#     sau khi chạy scripts/compute_gcmvn.py

global_cmvn:
  stats_npz_path: /PATH/TO/SERVER/SpeechTranslation/configs/vi-en/gcmvn.npz

input_channels: 1
input_feat_per_channel: 80

specaugment:
  freq_mask_F: 27
  freq_mask_N: 1
  time_mask_N: 1
  time_mask_T: 100
  time_mask_p: 1.0
  time_wrap_W: 0

transforms:
  '*':
  - global_cmvn
  _train:
  - global_cmvn
  - specaugment
